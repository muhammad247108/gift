<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> My love 🌅</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    flex-direction:column;
}

/* Container card */
.card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    padding:50px;
    border-radius:30px;
    text-align:center;
    max-width:600px;
    box-shadow:0 15px 50px rgba(0,0,0,0.4);
    animation:fadeIn 1.5s ease forwards;
}
@keyframes fadeIn { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }

h1 { font-family:'Dancing Script', cursive; font-size:3rem; margin-bottom:20px; text-shadow:0 2px 15px rgba(0,0,0,0.4); }

p { font-size:1.2rem; line-height:1.6; color:#fff; }

.back-btn {
    display:inline-block;
    margin-top:40px;
    padding:15px 35px;
    border-radius:40px;
    background: rgba(255,255,255,0.2);
    color:white;
    font-weight:600;
    text-decoration:none;
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.3);
    transition:0.4s;
    position:relative;
    overflow:hidden;
}
.back-btn::before {
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.2);
    transform:skewX(-20deg);
    transition:0.5s;
}
.back-btn:hover::before { left:100%; }
.back-btn:hover { color:#764ba2; transform:scale(1.05); box-shadow:0 10px 30px rgba(255,255,255,0.4);}
</style>
</head>
<body>

<div class="card">
<h1>My Love 🌅</h1>
<p>
I love you. 🌟
</p>
<a href="index.html" class="back-btn">⬅ Back to Gallery</a>
</div>

</body>
</html>
